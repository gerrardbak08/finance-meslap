<style>
:root{
  --bg:#f2f4f6;--surface:#ffffff;
  --navy:#1b3a8b;--navy-dark:#0a1d50;--navy-soft:#2f4ea6;--brand:#2563eb;
  --text:#191f28;--text-sub:#6b7684;--text-mute:#8b95a1;
  --border:#e8ebed;--line:#f1f3f5;
  --pos:#0f7b3f;--neg:#d83a3a;--track:#e9edf3;
  --pad:16px;--gap:12px;--radius:14px;--radius-sm:10px;--navh:64px;
}

/* ── keyframes ──────────────────── */
@keyframes fadeUp   {from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes heroIn   {from{opacity:0;transform:scale(.97);}to{opacity:1;transform:scale(1);}}
@keyframes growBar  {from{width:0%;}}
@keyframes blurIn   {from{opacity:0;filter:blur(12px);}to{opacity:1;filter:blur(0);}}
@keyframes navBar   {from{transform:translateX(-50%) scaleX(0);}to{transform:translateX(-50%) scaleX(1);}}
@keyframes lgPulse  {0%,100%{opacity:.3;transform:translateY(0);}50%{opacity:.75;transform:translateY(-5px);}}
@keyframes ripple   {to{transform:scale(5);opacity:0;}}
@keyframes lgExit   {to{opacity:0;transform:translateY(-18px);}}
@keyframes toastIn  {from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes shim     {0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* ── base ───────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);}
body{font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;color:var(--text);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}

/* ── scroll progress ────────────── */
#progress{position:fixed;top:0;left:0;height:2.5px;width:0;background:var(--brand);z-index:190;transition:width .08s linear;pointer-events:none;}

/* ── landing ────────────────────── */
#landing{
  position:fixed;inset:0;z-index:200;
  background:linear-gradient(155deg,var(--navy) 0%,var(--navy-dark) 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;
}
#landing::before{content:'';position:absolute;top:-70px;right:-50px;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,.05);pointer-events:none;}
#landing::after{content:'';position:absolute;bottom:60px;left:-70px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none;}
#landing.exit{animation:lgExit .45s cubic-bezier(.4,0,.6,1) both;}
.lg-body{text-align:center;color:#fff;padding:0 36px;position:relative;z-index:1;}
.lg-org{font-size:13px;color:#c4d0ee;font-weight:700;letter-spacing:.04em;margin-bottom:22px;animation:blurIn .6s ease .1s both;}
.lg-year{font-size:18px;color:#aebbe2;font-weight:700;animation:fadeUp .5s cubic-bezier(.22,.68,0,1.2) .28s both;}
.lg-title{font-size:46px;font-weight:900;letter-spacing:-.03em;line-height:1.03;margin-top:6px;animation:fadeUp .55s cubic-bezier(.22,.68,0,1.2) .38s both;}
.lg-date{font-size:13px;color:#7a9ac8;margin-top:18px;font-weight:500;animation:fadeUp .5s cubic-bezier(.22,.68,0,1.2) .52s both;}
.lg-hint{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 36px);display:flex;flex-direction:column;align-items:center;gap:9px;animation:fadeUp .5s ease .72s both;z-index:1;}
.lg-hint-dot{width:7px;height:7px;border-radius:50%;background:#8fa4cc;animation:lgPulse 2s ease-in-out 1s infinite;}
.lg-hint-txt{font-size:11.5px;color:#6a82b0;font-weight:600;letter-spacing:.04em;}

/* ── app shell ──────────────────── */
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;}
.scroll{padding:4px var(--pad) calc(env(safe-area-inset-bottom,0px) + 28px);}

/* ── header ─────────────────────── */
header{position:sticky;top:0;z-index:20;background:var(--bg);padding:14px var(--pad) 8px;}
header .org{font-size:13px;color:var(--text-mute);font-weight:600;}
header h1{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-top:2px;}
header .asof{font-size:12px;color:var(--text-mute);margin-top:3px;}

/* ── segment ────────────────────── */
.seg{position:relative;display:flex;gap:0;background:var(--track);border-radius:12px;padding:4px;margin-top:12px;overflow:hidden;}
.seg-pill{position:absolute;top:4px;left:4px;height:calc(100% - 8px);background:var(--surface);border-radius:9px;box-shadow:0 1px 3px rgba(0,0,0,.1);transition:left .28s cubic-bezier(.2,.7,.3,1),width .28s cubic-bezier(.2,.7,.3,1);pointer-events:none;z-index:0;}
.seg button{position:relative;z-index:1;flex:1;border:none;background:none;font-family:inherit;font-size:13px;font-weight:700;color:var(--text-sub);padding:9px 0;border-radius:9px;cursor:pointer;min-height:40px;transition:color .2s;overflow:hidden;}
.seg button.on{color:var(--brand);}

/* ── ripple ─────────────────────── */
.ripple-ink{position:absolute;border-radius:50%;transform:scale(0);animation:ripple .55s ease-out;pointer-events:none;}
.seg .ripple-ink{background:rgba(37,99,235,.12);}
nav .ripple-ink{background:rgba(37,99,235,.14);}

/* ── cards ──────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
.card+.card{margin-top:var(--gap);}
.pad{padding:var(--pad);}

/* ── animations (card) ──────────── */
.anim-hero{animation:heroIn .45s cubic-bezier(.22,.68,0,1.2) both;}
.anim{animation:fadeUp .38s cubic-bezier(.22,.68,0,1.2) both;}
.d1{animation-delay:.06s;}.d2{animation-delay:.12s;}.d3{animation-delay:.18s;}
.d4{animation-delay:.24s;}.d5{animation-delay:.30s;}

/* ── hero ───────────────────────── */
.hero{background:linear-gradient(145deg,var(--navy) 0%,var(--navy-dark) 100%);border-radius:var(--radius);padding:20px var(--pad);color:#fff;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 85% 15%,rgba(255,255,255,.08) 0%,transparent 55%);pointer-events:none;}
.hero::after{content:'';position:absolute;bottom:-30px;right:-20px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none;}
.hero .label{font-size:13px;color:#c4d0ee;font-weight:600;position:relative;}
.hero .big{font-size:38px;font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-top:4px;position:relative;}
.hero .sub{font-size:14px;color:#aebbe2;margin-top:2px;position:relative;}
.hero .row{display:flex;gap:10px;margin-top:16px;position:relative;}
.hero .mini{flex:1;background:rgba(255,255,255,.1);border-radius:var(--radius-sm);padding:12px 14px;backdrop-filter:blur(4px);}
.hero .mini .t{font-size:12px;color:#c4d0ee;font-weight:600;}
.hero .mini .v{font-size:19px;font-weight:800;margin-top:3px;}

/* ── rate card ──────────────────── */
.rate-top{display:flex;justify-content:space-between;align-items:flex-start;}
.rate-top .t{font-size:15px;font-weight:700;}
.rate-top .t span{display:block;font-size:12px;color:var(--text-mute);font-weight:500;margin-top:1px;}
.rate-top .pct{font-size:30px;font-weight:800;color:var(--brand);letter-spacing:-.02em;}
.bar{height:10px;background:var(--track);border-radius:6px;overflow:hidden;margin:14px 0 10px;}
.bar>span{display:block;height:100%;background:linear-gradient(90deg,#60a5fa,var(--brand));border-radius:6px;animation:growBar .85s cubic-bezier(.22,.68,0,1.2) both;animation-delay:.22s;}
.rate-foot{font-size:12.5px;color:var(--text-sub);}

/* ── list ───────────────────────── */
.sec{font-size:14px;font-weight:800;color:var(--text-sub);margin:22px 4px 10px;}
.km{padding:2px var(--pad);}
.km .r{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:14px 0;border-top:1px solid var(--line);}
.km .r:first-child{border-top:none;}
.km .r .name{font-size:14px;font-weight:600;flex:1;min-width:0;}
.km .r .right{text-align:right;flex-shrink:0;}
.km .r .right .v{font-size:17px;font-weight:800;letter-spacing:-.01em;}
.km .r .right .v.blue{color:var(--brand);}
.km .r .right .v.green{color:var(--pos);}
.km .r .right .note{font-size:11.5px;color:var(--text-mute);margin-top:1px;}

/* ── table ──────────────────────── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{font-size:10.5px;color:var(--text-mute);font-weight:700;text-align:center;padding:9px 5px;border-bottom:1px solid var(--border);white-space:nowrap;}
thead th.l{text-align:left;padding-left:0;position:sticky;left:0;background:var(--surface);z-index:2;box-shadow:2px 0 0 var(--border);}
tbody td{padding:9px 5px;border-bottom:1px solid var(--line);text-align:center;white-space:nowrap;}
tbody td.l{text-align:left;white-space:nowrap;padding-left:0;position:sticky;left:0;background:var(--surface);z-index:1;box-shadow:2px 0 0 var(--line);}
tbody tr:last-child td{border-bottom:none;}
tbody td.name{font-weight:600;color:var(--text);}
tbody td.sub{padding-left:10px;color:var(--text-sub);font-weight:500;}
tbody td.sub::before{content:"ㄴ ";color:var(--text-mute);font-size:10px;}
tr.total td{font-weight:800;border-top:1px solid var(--border);background:#fafbfc;}
tr.total td.l{background:#fafbfc;}
td.neg{color:var(--neg);}td.pos{color:var(--pos);}td.zero{color:var(--text-mute);}
td.grouphd{color:var(--brand);font-size:11px;font-weight:800;padding-top:10px;padding-bottom:3px;}
td.grouphd.debt{color:var(--neg);}

/* ── misc ───────────────────────── */
.cap{font-size:11.5px;color:var(--text-mute);margin-top:8px;}
.grp{font-size:12px;font-weight:800;color:var(--brand);margin:16px 4px 6px;}
.info{display:flex;gap:8px;align-items:flex-start;background:#eef3ff;border:1px solid #d6e0ff;border-radius:var(--radius-sm);padding:11px 13px;font-size:13px;color:#33509c;line-height:1.45;margin-bottom:12px;}
.info svg{flex:0 0 auto;margin-top:1px;}
.totbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:16px var(--pad);}
.totbar .t{font-size:13px;color:var(--text-sub);font-weight:700;flex:1;min-width:0;}
.totbar .v{text-align:right;flex-shrink:0;}
.totbar .v .a{font-size:21px;font-weight:800;letter-spacing:-.02em;}
.totbar .v .b{font-size:12px;color:var(--text-mute);margin-top:1px;}
.pill{display:inline-block;font-size:11px;font-weight:700;color:var(--pos);background:#e7f4ec;border-radius:6px;padding:2px 7px;margin-left:6px;vertical-align:middle;}
.badge-q2{display:inline-block;font-size:11px;font-weight:700;background:#fff3e8;color:#b45309;border-radius:6px;padding:2px 7px;margin-left:6px;vertical-align:middle;}

/* ── nav ────────────────────────── */
nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:480px;height:var(--navh);background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);}
nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--text-mute);font-size:11px;font-weight:600;font-family:inherit;min-height:52px;position:relative;transition:color .2s;overflow:hidden;}
nav button svg{width:22px;height:22px;transition:transform .25s cubic-bezier(.22,.68,0,1.2);}
nav button.on{color:var(--brand);}
nav button.on svg{transform:scale(1.12);}
nav button.on::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:20px;height:2.5px;background:var(--brand);border-radius:0 0 3px 3px;animation:navBar .3s cubic-bezier(.22,.68,0,1.2) both;}

/* ── report nav cards (원본 탭) ── */
.rpt-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.rpt-card+.rpt-card{margin-top:10px;}
.rpt-hd{display:flex;align-items:center;gap:12px;padding:16px var(--pad);}
.rpt-num{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--navy),var(--navy-dark));color:#fff;font-size:16px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:-.02em;}
.rpt-title{font-size:14px;font-weight:700;color:var(--text);}
.rpt-sub{font-size:12px;color:var(--text-mute);margin-top:2px;}
.rpt-tags{display:flex;flex-wrap:wrap;gap:5px;padding:0 var(--pad) 14px;}
.rpt-tag{font-size:11.5px;font-weight:600;color:var(--text-sub);background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:3px 9px;}
.rpt-actions{display:flex;border-top:1px solid var(--line);}
.rpt-open{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-size:13px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--navy),var(--navy-dark));padding:14px var(--pad);border:none;font-family:inherit;cursor:pointer;}
.rpt-dl{display:flex;align-items:center;justify-content:center;gap:5px;font-size:12px;font-weight:700;color:var(--brand);padding:14px 18px;text-decoration:none;border-left:1px solid var(--line);white-space:nowrap;}

/* ── report slide panel ─────────── */
#rpanel{position:fixed;inset:0;z-index:250;display:flex;flex-direction:column;background:var(--bg);transform:translateX(100%);transition:transform .32s cubic-bezier(.2,.7,.3,1);will-change:transform;}
#rpanel.open{transform:translateX(0);}
.rp-hd{flex-shrink:0;background:linear-gradient(145deg,var(--navy) 0%,var(--navy-dark) 100%);padding:calc(env(safe-area-inset-top,0px)+14px) var(--pad) 16px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;}
.rp-hd::before{content:'';position:absolute;top:-50px;right:-30px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.06);pointer-events:none;}
.rp-back{background:none;border:none;display:flex;align-items:center;gap:5px;color:#aebbe2;font-size:13px;font-weight:600;cursor:pointer;padding:0;font-family:inherit;position:relative;}
.rp-back svg{width:16px;height:16px;}
.rp-ttl{font-size:14px;font-weight:700;color:#fff;position:relative;}
#rp-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);}
#rp-body canvas{display:block;width:100%!important;margin-bottom:2px;}
#rp-spin{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--text-mute);font-size:13px;}
.rp-spin-ring{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── toast ──────────────────────── */
#toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 20px);transform:translateX(-50%) translateY(8px);background:rgba(25,31,40,.92);color:#fff;font-size:12.5px;font-weight:600;padding:10px 16px;border-radius:10px;opacity:0;pointer-events:none;z-index:150;white-space:nowrap;transition:opacity .25s,transform .25s;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}


/* ── views ──────────────────────── */
@keyframes slideView{from{opacity:0;transform:translateX(12px);}to{opacity:1;transform:translateX(0);}}
.view{display:none;}
.view.on{display:block;animation:slideView .28s cubic-bezier(.2,.7,.3,1) both;}

/* ── app dissolve (랜딩 크로스페이드) ── */
.app{opacity:0;transition:opacity .38s ease .08s;}
.app.visible{opacity:1;}

/* ── asof pulse dot ─────────────── */
.asof-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--pos);margin-right:5px;vertical-align:middle;position:relative;}
.asof-dot::after{content:'';position:absolute;inset:0;border-radius:50%;background:var(--pos);animation:lgPulse2 2s ease-out infinite;}
@keyframes lgPulse2{0%{transform:scale(1);opacity:.6;}100%{transform:scale(2.4);opacity:0;}}

/* ── small screens ──────────────── */
@media(max-width:375px){
  :root{--pad:13px;--radius:12px;}
  header h1{font-size:18px;}
  .hero .big{font-size:32px;}
  .hero .mini .v{font-size:17px;}
  .lg-title{font-size:38px;}
  table{font-size:11.5px;}
  thead th,tbody td{padding:8px 4px;}
}
@media(prefers-reduced-motion:reduce){*{animation-duration:.001s!important;transition-duration:.001s!important;}}
</style>

/* ===== 헬퍼 ===== */
function fmt(n){return Math.abs(n).toLocaleString("ko-KR");}
function won(n){return n.toLocaleString("ko-KR")+"원";}
function eok(n){return (n/1e8).toFixed(1)+"억원";}
function tdNum(v){
  var cls=v===0?"zero":(v<0?"neg":"");
  return '<td class="num '+cls+'">'+(v<0?"-":"")+fmt(v)+'</td>';
}
function tableRows(rows){
  return rows.map(function(r){
    var name=r[0],isTot=(name==="합계"),isSub=name.charAt(0)==="└";
    var disp=isSub?name.slice(1):name;
    var ncls=isSub?"sub":"name";
    var tds=r.slice(1).map(tdNum).join("");
    return '<tr class="'+(isTot?"total":"")+'"><td class="l '+ncls+'">'+disp+'</td>'+tds+'</tr>';
  }).join("");
}
function fourColTable(rows,carryLabel){
  var cl=carryLabel||"이월";
  return '<div class="card pad tbl-wrap"><table class="num">'
    +'<thead><tr><th class="l">구분</th><th>'+cl+'</th><th>수입</th><th>지출</th><th>결산</th></tr></thead>'
    +'<tbody>'+tableRows(rows)+'</tbody></table></div>';
}
function infoSvg(){
  return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#33509c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>';
}

/* ===== 카운트업 ===== */
var rafId1,rafId2;
function animEok(el,target,dur){
  if(!el)return;
  if(rafId1)cancelAnimationFrame(rafId1);
  var s=performance.now();
  function step(now){
    var p=Math.min((now-s)/dur,1),e=1-Math.pow(1-p,3);
    el.textContent=((target*e)/1e8).toFixed(1)+"억원";
    if(p<1)rafId1=requestAnimationFrame(step);
    else el.textContent=eok(target);
  }
  rafId1=requestAnimationFrame(step);
}
function animMini(el,target,dur){
  if(!el)return;
  if(rafId2)cancelAnimationFrame(rafId2);
  var s=performance.now();
  function step(now){
    var p=Math.min((now-s)/dur,1),e=1-Math.pow(1-p,3);
    el.textContent=((target*e)/1e8).toFixed(1)+"억";
    if(p<1)rafId2=requestAnimationFrame(step);
    else el.textContent=(target/1e8).toFixed(1)+"억";
  }
  rafId2=requestAnimationFrame(step);
}
function afterRender(){
  var d=D[state.q];
  animEok(document.getElementById("hero-big"),d.bal,950);
  animMini(document.getElementById("hero-inc"),d.incomeTotal,750);
  animMini(document.getElementById("hero-exp"),d.expense,750);
}

var toastTimer;
function showToast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.classList.remove("show");},2800);
}

/* ===== ripple ===== */
function addRipple(el){
  el.addEventListener("click",function(e){
    var r=document.createElement("span");
    r.className="ripple-ink";
    var rect=this.getBoundingClientRect();
    var sz=Math.max(rect.width,rect.height);
    r.style.cssText="width:"+sz+"px;height:"+sz+"px;top:"+(e.clientY-rect.top-sz/2)+"px;left:"+(e.clientX-rect.left-sz/2)+"px;";
    this.appendChild(r);
    setTimeout(function(){r.remove();},600);
  });
}

function positionPill(){
  var btn=document.querySelector("#seg button.on");

  if(!btn||!pill)return;
  pill.style.left=btn.offsetLeft+"px";
  pill.style.width=btn.offsetWidth+"px";
}

window.addEventListener("scroll",function(){
  var sc=document.documentElement.scrollTop||document.body.scrollTop;
  var sh=document.documentElement.scrollHeight-document.documentElement.clientHeight;
  if(sh>0)document.getElementById("progress").style.width=(sc/sh*100)+"%";
},{ passive:true });

/* ===== 보고서 슬라이드 패널 (PDF.js) ===== */
var _rpCurrentUrl=null;
var _rpTask=null;
var PDF_BASE='https://gerrardbak08.github.io/finance-meslap/';

if(typeof pdfjsLib!=='undefined'){
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

function openRpanel(pdfFile,title){
  var panel=document.getElementById('rpanel');
  document.getElementById('rp-ttl').textContent=title;
  panel.classList.add('open');
  panel.setAttribute('aria-hidden','false');
  document.body.style.overflow='hidden';
  var url=PDF_BASE+pdfFile;
  if(_rpCurrentUrl===url)return;
  _rpCurrentUrl=url;
  _loadPdf(url);
}

function _loadPdf(url){
  var body=document.getElementById('rp-body');
  body.innerHTML='<div id="rp-spin"><div class="rp-spin-ring"></div>PDF 불러오는 중…</div>';
  if(_rpTask){try{_rpTask.destroy();}catch(e){}_rpTask=null;}
  if(typeof pdfjsLib==='undefined'){
    body.innerHTML='<div id="rp-spin">PDF.js 로드 실패</div>';
    return;
  }
  _rpTask=pdfjsLib.getDocument({url:url,cMapUrl:'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',cMapPacked:true});
  _rpTask.promise.then(function(pdf){
    body.innerHTML='';
    var W=body.offsetWidth||370;
    var tasks=[];
    for(var i=1;i<=pdf.numPages;i++){tasks.push(_renderPage(pdf,i,body,W));}
    return Promise.all(tasks);
  }).catch(function(){
    body.innerHTML='<div id="rp-spin">PDF를 불러올 수 없습니다.</div>';
  });
}

function _renderPage(pdf,num,container,W){
  return pdf.getPage(num).then(function(page){
    var vp=page.getViewport({scale:1});
    var scale=(W/vp.width)*(window.devicePixelRatio||1);
    var svp=page.getViewport({scale:scale});
    var canvas=document.createElement('canvas');
    canvas.width=svp.width;
    canvas.height=svp.height;
    canvas.style.width=W+'px';
    canvas.style.height=Math.round(W*vp.height/vp.width)+'px';
    container.appendChild(canvas);
    return page.render({canvasContext:canvas.getContext('2d'),viewport:svp}).promise;
  });
}

function closeRpanel(){
  var panel=document.getElementById('rpanel');
  panel.classList.remove('open');
  panel.setAttribute('aria-hidden','true');
  document.body.style.overflow='';
  _rpCurrentUrl=null;
  setTimeout(function(){
    if(_rpTask){try{_rpTask.destroy();}catch(e){}_rpTask=null;}
    document.getElementById('rp-body').innerHTML='';
  },350);
}
document.addEventListener('keydown',function(e){
  if(e.key==='Escape')closeRpanel();
});
</script>
